name: E2E Validation

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [fix/processing-stuck]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Build app
        run: npm run build

      - name: Run critical e2e flows
        run: npx playwright test tests/e2e/processing-flow.spec.ts tests/diagnostic.spec.ts --project=chromium

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 14
