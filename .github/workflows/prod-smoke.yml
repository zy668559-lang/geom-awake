name: Production Smoke

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Production URL to verify"
        required: false
        default: "https://geometry-mvp.vercel.app"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run production smoke e2e
        env:
          PLAYWRIGHT_BASE_URL: ${{ github.event.inputs.base_url || 'https://geometry-mvp.vercel.app' }}
        run: npx playwright test tests/e2e/processing-flow.spec.ts --project=chromium --grep "within 60s must navigate or show explicit error"

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 14
